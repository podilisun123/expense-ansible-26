- name: configure backend server
  hosts: backend
  become: yes
  tasks:
  - name: disable old node nodejs
    ansible.builtin.command: dnf module disable nodejs -y
  - name: enable new nodejs
    ansible.builtin.command: dnf module enable nodejs:20 -y
  - name: install nodejs
    ansible.builtin.dnf:
      name: "{{ item }}"
      state: latest
    loop: 
    - nodejs
    - mysql

  - name: create expense expense user 
    ansible.builtin.user:
      name: expense
  